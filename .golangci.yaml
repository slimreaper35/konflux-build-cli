# Run 'golangci-lint config verify' after any edit to this config file

version: "2"

# Disable all default linters and specify only ones we want below
linters:
  default: none
  enable:
    - asciicheck
    - bidichk
    - bodyclose
    - canonicalheader
    - contextcheck
    - copyloopvar
    - dupl
    - dupword
    - errcheck
    - errname
    - forcetypeassert
    - gocheckcompilerdirectives
    - gocritic
    - gosec
    - govet
    - ineffassign
    - loggercheck
    - misspell
    - nilerr
    - nosprintfhostport
    - staticcheck
    - unconvert
    - unparam
    - unused
    # Linters for tests
    - ginkgolinter

  # Defines a set of rules to ignore issues.
  # It does not skip the analysis, and so does not ignore "typecheck" errors.
  exclusions:
    rules:
      # Exclude some linters from running on tests files.
      - path: _test\.go$
        linters:
          - errcheck
          - gosec
          - dupl
          - goconst
      - path: integration_tests/framework/
        linters:
          - errcheck
          - gosec
      # Run some linter only for test files by excluding its issues for everything else.
      - path-except: _test\.go$
        linters:
          - ginkgolinter

  # Per linter settings
  settings:
    gocritic:
      disabled-checks:
        - elseif
        - ifElseChain
    gosec:
      # Exclude file and directory permission rules.
      # These produce noise in CLI tools that create/copy files
      # with standard permissions (0755, 0644, etc.).
      excludes:
        - G301  # Expect directory permissions to be 0750 or less
        - G302  # Expect file permissions to be 0600 or less
        - G306  # Expect WriteFile permissions to be 0600 or less
    staticcheck:
      checks:
        - "default"
        - "-QF1001"  # De Morgan's law: not a meaningful readability improvement

formatters:
  enable:
    - gofmt
    - goimports

issues:
  # Maximum issues count per one linter.
  # Set to 0 to disable.
  # Default: 50
  max-issues-per-linter: 50
  # Maximum count of issues with the same text.
  # Set to 0 to disable.
  # Default: 3
  max-same-issues: 5
